name: Build, Release, and Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack NuGet package
        run: dotnet pack src/Randomer.csproj --configuration Release --output nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            # Randomer v${{ steps.version.outputs.VERSION }}
            
            This release includes:
            - Built from source
            - All tests passed
            - NuGet package available
            
            ## Installation
            
            ### NuGet Package Manager
            ```powershell
            Install-Package Randomer -Version ${{ steps.version.outputs.VERSION }}
            ```
            
            ### .NET CLI
            ```bash
            dotnet add package Randomer --version ${{ steps.version.outputs.VERSION }}
            ```
          draft: false
          prerelease: false
          files: ./nupkg/Randomer.${{ steps.version.outputs.VERSION }}.nupkg

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      
      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/Randomer.${{ steps.version.outputs.VERSION }}.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate